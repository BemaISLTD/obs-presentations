services:
  obs-presentation:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      OBS_DB_PATH: /app/data/obs-control.sqlite
      CONTROL_TOKEN: ${CONTROL_TOKEN:-}
    expose:
      - "3000"
    volumes:
      - obs-control-data:/app/data
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/api/control/health').then((response) => { if (!response.ok) process.exit(1) }).catch(() => process.exit(1))"
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 5

volumes:
  obs-control-data:

